name: Build and upload to TestFlight

on:
  workflow_dispatch:

concurrency:
  group: kael-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build Kael and upload
    runs-on: [self-hosted, macOS, ARM64]

    timeout-minutes: 60

    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
      CI: "true"

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}

      FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      TEAM_ID: ${{ secrets.TEAM_ID }}
      BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
      SCHEME: ${{ secrets.SCHEME }}
      EXPORT_METHOD: ${{ secrets.EXPORT_METHOD }}
      APP_NAME: ${{ secrets.APP_NAME }}

      BUNDLE_PATH: vendor/bundle
      FL_OUTPUT_DIR: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          ruby --version

      - name: Configure Match SSH key
        shell: bash
        env:
          MATCH_SSH_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$MATCH_SSH_KEY" > "$HOME/.ssh/kael_match_key"
          chmod 600 "$HOME/.ssh/kael_match_key"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          cat >> "$HOME/.ssh/config" <<'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/kael_match_key
            IdentitiesOnly yes
          EOF

          chmod 600 "$HOME/.ssh/config"

      - name: Configure Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.6"
          bundler-cache: true

      - name: Validate required secrets
        shell: bash
        run: |
          required_vars=(
            ASC_KEY_ID
            ASC_ISSUER_ID
            ASC_KEY_CONTENT
            FASTLANE_USER
            MATCH_PASSWORD
            TEAM_ID
            BUNDLE_ID
            SCHEME
            EXPORT_METHOD
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing"
              exit 1
            fi
          done

      - name: Build and upload to TestFlight
        run: bundle exec fastlane ios release

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Kael-build
          path: |
            build/*.ipa
            build/*.dSYM.zip
            fastlane/report.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove temporary SSH key
        if: always()
        shell: bash
        run: |
          rm -f "$HOME/.ssh/kael_match_key"
